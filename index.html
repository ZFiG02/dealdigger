<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealDigger V21 — Sellable Core</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;padding:16px;background:#0f172a;color:#fff}
input,select{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:none}
button{padding:12px;width:100%;background:#22c55e;border:none;border-radius:8px;color:#000;font-weight:bold}
.card{background:#1e293b;padding:16px;border-radius:10px;margin-top:16px}
h2{margin-top:0}
</style>
</head>
<body>

<h2>DealDigger V21</h2>

<div class="card">
<h3>Input</h3>
<input id="ask" placeholder="Asking Price">
<input id="sqft" placeholder="Square Feet">
<input id="manualArv" placeholder="Manual ARV (optional)">
<input id="fallbackPpsf" placeholder="Fallback PPSF (e.g. 70)">
<select id="condition">
<option value="light">Light Rehab</option>
<option value="moderate">Moderate Rehab</option>
<option value="heavy">Heavy Rehab</option>
<option value="gut">Full Gut</option>
</select>
<button onclick="analyze()">Analyze Deal</button>
</div>

<div class="card">
<h3>Results</h3>
<div id="results">—</div>
</div>

<script>
function val(id){return parseFloat(document.getElementById(id).value)||0}

function resolveArv(){
let sqft=val('sqft')
let manual=val('manualArv')
let ppsf=val('fallbackPpsf')

if(manual>0) return {arv:manual, source:'Manual'}

if(ppsf>0 && sqft>0) return {arv:ppsf*sqft, source:'PPSF'}

if(sqft>0) return {arv:70*sqft, source:'Default'}

return {arv:0, source:'None'}
}

function rehabCost(){
let sqft=val('sqft')
let c=document.getElementById('condition').value
let cost=0
if(c==='light') cost=20
if(c==='moderate') cost=35
if(c==='heavy') cost=55
if(c==='gut') cost=80
return sqft*cost
}

function analyze(){
let ask=val('ask')
let arvObj=resolveArv()
let arv=arvObj.arv
let rehab=rehabCost()

let mao=arv*0.7 - rehab
let assign=mao-ask
let offer=mao*0.9

document.getElementById('results').innerHTML=
"ARV: $"+arv.toFixed(0)+" ("+arvObj.source+")<br>"+
"Rehab: $"+rehab.toFixed(0)+"<br>"+
"MAO: $"+mao.toFixed(0)+"<br>"+
"Assignment: $"+assign.toFixed(0)+"<br>"+
"Offer: $"+offer.toFixed(0)
}
</script>

</body>
</html>
